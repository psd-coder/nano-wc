name: "Setup runner"
description: "It setups node, install pnpm packages and caches them"
runs:
  using: composite
  steps:
    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: pnpm
    - name: Enable Corepack
      run: corepack enable
      shell: bash
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
